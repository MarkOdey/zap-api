services:
  mongo:
    image: mongo:7
    ports:                                                                                                                                                                                    
      - "27018:27017" 
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/zap
    depends_on:
      - mongo
    volumes:
      - ./data:/app/data

volumes:
  mongo_data:
